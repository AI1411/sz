name: ✨ 新機能要望
description: 新しい機能や機能改善の提案
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        新機能の提案ありがとうございます。以下の情報を提供してください。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どのような課題や不便さがありますか？
      placeholder: 例）現在、査定申請の一括アップロード機能がないため、複数の申請を個別に登録する必要があり、作業が非効率である
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能があれば課題が解決されますか？
      placeholder: 例）CSVファイルから査定申請データを一括インポートできる機能を追加する
    validations:
      required: true

  - type: dropdown
    id: user-type
    attributes:
      label: 対象ユーザー
      description: この機能は主にどのユーザー向けですか？
      options:
        - 市町村/土地改良区
        - 都道府県
        - 地方農政局
        - 農林水産本省
        - 全ユーザー
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      description: この機能の優先度はどのくらいですか？
      options:
        - High（早急に必要）
        - Medium（あると便利）
        - Low（将来的にあると良い）
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: 期待される効果
      description: この機能が実装されると、どのようなメリットがありますか？
      placeholder: |
        - 査定申請の登録作業時間が50%削減される
        - データ入力ミスが減少する
        - 災害発生時の初動対応が迅速化される
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えられる解決方法はありますか？
      placeholder: 例）一括アップロードの代わりに、申請フォームのコピー機能を追加する
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ基準
      description: この機能が「完成した」と判断する基準は何ですか？
      placeholder: |
        - [ ] CSVファイルをアップロードできる
        - [ ] バリデーションエラーを適切に表示する
        - [ ] 100件以上のデータを一括登録できる
        - [ ] エラーログが記録される
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 追加情報
      description: その他、機能実装に役立つ情報があれば記載してください
      placeholder: 参考資料、画面モックアップ、類似サービスの例など
    validations:
      required: false
